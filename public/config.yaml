# 竞品情报简报配置（公开版）
# 实际使用时复制为 config.yaml 并填入你的推送 ID

project_name: "AI Agent 竞品情报简报"

competitors:
  - name: "Dify"
    keywords:
      - "Dify AI platform new release"
      - "Dify workflow update"
      - "Dify 更新 新功能"
    freshness: "week"
    max_results: 5

  - name: "Coze / 扣子"
    keywords:
      - "Coze AI agent platform update"
      - "扣子 平台更新"
    freshness: "week"
    max_results: 5

  - name: "LangChain / LangGraph"
    keywords:
      - "LangChain update"
      - "LangGraph release"
      - "LangSmith"
    freshness: "week"
    max_results: 5

  - name: "AutoGPT / AgentGPT"
    keywords:
      - "AutoGPT update"
      - "AI agent framework new release"
    freshness: "week"
    max_results: 3

  - name: "CrewAI"
    keywords:
      - "CrewAI multi-agent update"
      - "CrewAI release"
    freshness: "week"
    max_results: 3

  - name: "OpenAI Agents SDK"
    keywords:
      - "OpenAI Agents SDK update"
      - "OpenAI Agents"
    freshness: "week"
    max_results: 3

  - name: "Bolt.new / Lovable"
    keywords:
      - "Bolt.new AI coding"
      - "AI coding platform update"
    freshness: "week"
    max_results: 3

topics:
  - "AI agent 行业趋势"
  - "大模型 Agent 应用落地"
  - "AI agent open source"
  freshness: "week"
  max_results: 3

briefing_template: |
  📊 **{project_name} | 第{week_num}周 | {date_range}**

  {competitor_sections}

  📈 **行业趋势概览**
  {industry_trends}

  ⚡ **本周要点**
  {key_takeaways}

  ---
  🤖 *由 AI Agent 自动生成 · {generated_at}*

delivery:
  feishu:
    enabled: true
    target_chat: ""
    target_type: "p2p"
    user_open_id: "ou_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  message_plugin:
    enabled: false
    channel: ""
    target: ""
